---
apiVersion: v1
kind: Namespace
metadata:
  name: g8s
  labels:
    pod-security.kubernetes.io/enforce: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: g8s
  namespace: g8s
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name:  g8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: g8s
  namespace: g8s
---
apiVersion: api.g8s.io/v1alpha1
kind: KubeTLSBundle
metadata:
  name: g8s-webhook
  namespace: g8s
spec:
  appname: g8s-webhook
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: g8s-controller
  namespace: g8s
  labels:
    app: g8s-controller
spec:
  selector:
    matchLabels:
      app: g8s-controller
  template:
    metadata:
      labels:
        app: g8s-controller
    spec:
      serviceAccountName: g8s
      tolerations:
        - key: "CriticalAddonsOnly"
          operator: "Exists"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/controlplane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/etcd"
          operator: "Exists"
          effect: "NoExecute"
      containers:
        - name: controller
          image: jrodonnell/g8s-runtime:latest
          args: ["--role", "controller"]
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            seccompProfile: 
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: g8s-webhook
  namespace: g8s
  labels:
    app: g8s-webhook
spec:
  selector:
    matchLabels:
      app: g8s-webhook
  template:
    metadata:
      labels:
        app: g8s-webhook
    spec:
      serviceAccountName: g8s
      tolerations:
        - key: "CriticalAddonsOnly"
          operator: "Exists"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/controlplane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/etcd"
          operator: "Exists"
          effect: "NoExecute"
      containers:
        - name: webhook
          image: jrodonnell/g8s-runtime:latest
          args: ["--role", "webhook"]
          ports:
          - name: https
            containerPort: 8443
            protocol: TCP
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            seccompProfile: 
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tls-bundle
              mountPath: "/key.pem"
              subPath: key.pem
            - name: tls-bundle
              mountPath: "cert.pem"
              subPath: cert.pem
      volumes:
        - name: tls-bundle
          secret:
            secretName: kubetlsbundle-g8s-webhook
---
apiVersion: v1
kind: Service
metadata:
  name: g8s-webhook
  namespace: g8s
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: https
  selector:
    app: g8s-webhook
  type: ClusterIP
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: g8s-webhook
  labels:
    app: g8s-webhook
webhooks:
  - name: g8s-webhook.g8s.svc.cluster.local
    clientConfig:
      service:
        name: g8s-webhook
        namespace: g8s
        path: "/mutate"
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
    namespaceSelector:
      matchLabels:
        mutateme: enabled
    sideEffects: None
    admissionReviewVersions: ["v1"]
